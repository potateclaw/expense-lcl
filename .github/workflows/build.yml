name: Build Budgy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          echo "PATH=$HOME/.cargo/bin:$PATH" >> $GITHUB_PATH

      - name: Setup Rust (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          Invoke-Expression (Invoke-WebRequest -Uri https://sh.rustup.rs -UseBasicParsing).Content
          & rustup-init.exe -y
          & "$env:USERPROFILE\.cargo\bin\cargo.exe" --version

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev

      - name: Build Rust (Unix)
        if: matrix.platform != 'windows-latest'
        working-directory: src-tauri
        run: |
          source "$HOME/.cargo/env"
          cargo build --release

      - name: Build Rust (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: src-tauri
        run: |
          & "$env:USERPROFILE\.cargo\bin\cargo.exe" build --release

      - name: Upload artifact (Linux)
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: budgy-ubuntu
          path: src-tauri/target/release/budgy

      - name: Upload artifact (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: budgy-macos
          path: src-tauri/target/release/budgy

      - name: Upload artifact (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: budgy-windows
          path: src-tauri/target/release/budgy.exe
