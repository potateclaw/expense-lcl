<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budgy</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/receipt.css">
</head>
<body>
    <div id="app">
        <div id="screen-container"></div>
    </div>
    <div id="chat-fab">
        <span>💬</span>
    </div>
    
    <!-- Add Expense Popup -->
    <div id="add-expense-popup" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6); flex-direction:column; justify-content:center; align-items:center; z-index:10000;">
        <div style="background:#1e1e2e; border-radius:16px; padding:24px; width:280px; text-align:center;">
            <h3 style="margin:0 0 20px 0; color:#fff; font-size:18px;">Add Expense</h3>
            <button id="popup-camera-btn" style="display:block; width:100%; padding:14px; margin-bottom:10px; border:none; border-radius:10px; font-size:15px; background:#2a2a3a; color:#fff; cursor:pointer;">📷 Open Camera</button>
            <button id="popup-manual-btn" style="display:block; width:100%; padding:14px; margin-bottom:10px; border:none; border-radius:10px; font-size:15px; background:#2a2a3a; color:#fff; cursor:pointer;">✏️ Add Manually</button>
            <button id="popup-cancel-btn" style="display:block; width:100%; padding:14px; border:none; border-radius:10px; font-size:15px; background:transparent; color:#888; cursor:pointer;">Cancel</button>
        </div>
    </div>
    <div id="chat-panel" class="hidden">
        <div id="chat-header">
            <span>Budgy Assistant</span>
            <button onclick="toggleChat()">×</button>
        </div>
        <div id="chat-messages"></div>
        <div id="chat-input">
            <form id="chat-form" onsubmit="sendChat(); return false;">
                <input type="text" id="chat-text" placeholder="Ask about your spending..." autocomplete="off" enterkeyhint="send">
                <button type="submit">Send</button>
            </form>
        </div>
    </div>
    <script>
        window.__invoke__ = window.__TAURI__?.core?.invoke;
    </script>
    <script src="scripts/export.js"></script>
    <script src="scripts/onboarding.js"></script>
    <script src="scripts/dashboard.js"></script>
    <script src="scripts/camera.js"></script>
    <script src="scripts/analytics.js"></script>
    <script src="scripts/chat.js"></script>
    <script src="scripts/app.js"></script>
</body>
</html>
